<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>月等效業績試算器</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>月等效業績試算器</h1>

    <div class="card">
      <p>基本薪資</p>
      <input id="baseSalary" type="number" value="29500" />

      <p>職務相關報酬總額</p>
      <input id="jobAllowance" type="number" value="12090" />

      <p>本月總業績</p>
      <input id="revenue" type="number" value="500000" />

      <p>諮詢天數</p>
      <input id="consultDays" type="number" value="5" />

      <p>總上班天數</p>
      <input id="totalDays" type="number" value="20" />

      <button id="calcBtn">開始試算</button>
    </div>

    <div class="card">
      <h2>結果</h2>
      <p>原職務天數：<span id="originalDays">-</span></p>
      <p>月等效業績：<span id="equivalentRevenue">-</span></p>
      <p>職務相關報酬實領：<span id="actualAllowance">-</span></p>
      <p>預估績效獎金：<span id="bonus">-</span></p>
      <p>預估總收入：<span id="totalIncome">-</span></p>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
